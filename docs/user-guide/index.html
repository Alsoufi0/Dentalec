<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DentalOS AI — User Guide</title>
<style>
  :root{--bg:#0a0e14;--panel:#111722;--panel2:#161d2b;--line:#232c3d;--line2:#2e3950;--text:#e8eef9;--muted:#8794ab;--teal:#36d6c3;--blue:#5b8bff;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05080c;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);}
  .deck{display:flex;flex-direction:column;align-items:center;gap:18px;padding:18px;}
  /* Each slide is an exact page: 1280 x 720 (16:9), nothing overflows. */
  .slide{position:relative;width:1280px;height:720px;flex:none;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent),var(--panel);border:1px solid var(--line);border-radius:18px;padding:44px 52px;}
  .accent{position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--teal),var(--blue));}
  .head{display:flex;align-items:center;gap:16px;}
  .num{flex:none;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-weight:800;color:#04130f;background:linear-gradient(135deg,var(--teal),var(--blue));font-size:1.25rem;}
  .head h2{font-size:2rem;letter-spacing:-.02em;}
  .sub{color:var(--muted);font-size:1.05rem;margin:8px 0 0 62px;}
  .divider{height:1px;background:var(--line);margin:20px 0 24px;}
  .body{display:grid;grid-template-columns:1.45fr 1fr;gap:34px;align-items:start;}
  .shot{border:1px solid var(--line2);border-radius:14px;overflow:hidden;background:#05080c;}
  .shot img{width:100%;max-height:498px;object-fit:contain;display:block;}
  .steps h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.07em;color:var(--teal);margin-bottom:16px;}
  .steps ol{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:14px;}
  .steps li{counter-increment:s;position:relative;padding-left:40px;line-height:1.45;font-size:1.06rem;color:#dde6f6;}
  .steps li::before{content:counter(s);position:absolute;left:0;top:-1px;width:27px;height:27px;border-radius:8px;background:rgba(54,214,195,.14);color:#7fe7da;font-weight:800;font-size:.9rem;display:grid;place-items:center;}
  .steps b{color:#fff;}
  .tip{position:absolute;left:calc(52px + 1.45*((1280px - 104px - 34px)/2.45));}
  .tipbox{margin-top:22px;padding:15px 17px;border-radius:12px;background:rgba(91,139,255,.1);border:1px solid rgba(91,139,255,.28);color:#cdd9f5;font-size:.96rem;line-height:1.5;}
  .tipbox b{color:#bcd0ff;}
  /* hero + closing */
  .hero{justify-content:center;text-align:center;display:flex;flex-direction:column;align-items:center;
    background:radial-gradient(900px 400px at 30% -10%,rgba(54,214,195,.14),transparent 60%),radial-gradient(800px 400px at 100% 0%,rgba(91,139,255,.14),transparent 55%),var(--panel);}
  .hero .badge{display:inline-flex;gap:9px;padding:9px 18px;border-radius:999px;border:1px solid var(--line2);background:var(--panel2);color:var(--teal);font-weight:700;font-size:.92rem;letter-spacing:.05em;}
  .hero h1{font-size:3.4rem;line-height:1.07;letter-spacing:-.03em;margin:24px 0 16px;}
  .hero p{color:var(--muted);font-size:1.2rem;max-width:840px;line-height:1.6;}
  .toc{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:920px;margin:30px auto 0;}
  .toc span{padding:8px 14px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);color:#c7d2f0;font-size:.9rem;font-weight:600;}
  .fine{color:var(--muted);font-size:.92rem;margin-top:34px;font-style:italic;max-width:900px;}
  .closing{justify-content:center;text-align:center;display:flex;flex-direction:column;align-items:center;}
  .closing h2{font-size:2.6rem;letter-spacing:-.02em;margin-bottom:16px;}
  .closing p{color:var(--muted);max-width:820px;font-size:1.18rem;line-height:1.6;}
  .pills{margin-top:26px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .pill{padding:10px 16px;border-radius:11px;background:rgba(54,214,195,.12);border:1px solid rgba(54,214,195,.28);color:#9fe7dc;font-weight:600;font-size:1rem;}
  @media print{
    @page{size:1280px 720px;margin:0;}
    html,body{background:#05080c;}
    .deck{padding:0;gap:0;}
    .slide{border-radius:0;border:0;page-break-after:always;break-after:page;}
    .slide:last-child{page-break-after:auto;}
  }
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<script>
const slides = [
  {num:'1',title:'Create an account or sign in',sub:'Your private workspace keeps your sources, notes, flashcards, and progress saved.',img:'shots/01-signin.png',
   steps:['Open the app. New here? Click <b>Create an account</b>.','Enter your <b>name, email, and password</b> (8+ characters).','Returning? Switch to <b>Sign in</b> with your email and password.','Use the <b>Light / Dark</b> toggle (top right) any time.'],
   tip:'<b>Private by design:</b> everything you upload stays inside your own account.'},
  {num:'2',title:'Add your study source',sub:'Everything the app generates is built only from the material you add here.',img:'shots/02-library.png',
   steps:['Go to <b>Notes & Books</b> in the sidebar.','<b>Drop a PDF</b> or <b>paste notes</b>, then press <b>Index</b>.','Wait a few seconds — it appears under <b>Indexed material</b>.','Remove any source with the <b>trash icon</b> beside it.'],
   tip:'<b>Start here</b> — most features stay locked until you add a source.'},
  {num:'3',title:'The Dashboard',sub:'Your home base: jump back in, explore anatomy, and see your progress.',img:'shots/03-dashboard.png',
   steps:['<b>Continue studying</b> picks up where you left off.','<b>Interactive Tooth Anatomy</b> — tap a layer to study it with accurate labels.','<b>Your Progress</b> shows readiness and a topic mastery map.','The left <b>sidebar</b> moves you between every tool.'],
   tip:'<b>App-like:</b> content scrolls inside the panel, so pages never run on endlessly.'},
  {num:'4',title:'AI Tutor — ask anything',sub:'Ask a focused question and get a clear, source-grounded answer.',img:'shots/04-tutor.png',
   steps:['Open <b>AI Tutor</b>.','Type a question at the bottom, or tap a <b>suggested question</b>.','Read the answer — organised into clear sections from your notes.','Use <b>Listen</b> to hear it, or <b>Cards</b> to make flashcards.'],
   tip:'The <b>AI Tutor</b> is the one place meant to run long — it is a conversation.'},
  {num:'5',title:'Study Tools — one focused output',sub:'Turn your source into a specific study artifact. Pick the way you want to study.',img:'shots/05-studytools.png',
   steps:['Open <b>Study Tools</b>.','From the <b>Way of study</b> dropdown, choose what you need.','Press <b>Generate</b> — each choice gives a different, on-topic result.','Options: gap check, differential, visual map, mnemonics, and more.'],
   tip:'<b>Each tool is unique:</b> a differential gives a table, visual learning a step map.'},
  {num:'6',title:'How answers are shown',sub:'Long content is interactive and scannable — never a wall of text.',img:'shots/06-studytools-output.png',
   steps:['<b>Comparison tables</b> are clean and condensed for quick scanning.','Long answers split into <b>collapsible sections</b> — open what you need.','Processes render as a <b>connected step map</b>.','Wide tables scroll sideways inside their card.'],
   tip:'Answers are concise on purpose, and can still be wrong — <b>verify</b> against your material.'},
  {num:'7',title:'Flashcards — active recall',sub:'Review one card at a time with spaced repetition.',img:'shots/08-flashcards.png',
   steps:['Open <b>Flashcards</b> and press <b>Make cards</b>.','Click the card or press <b>Space</b> to flip to the answer.','Move with <b>Previous / Next</b> (or the arrow keys).','Rate <b>Again / Hard / Good / Easy</b> to schedule reviews.'],
   tip:'<b>Export</b> your deck as Anki TSV any time.'},
  {num:'8',title:'Quizzes — test yourself',sub:'Answer multiple-choice questions and get instant feedback.',img:'shots/09-exam-quiz.png',
   steps:['Open <b>Exams</b> (or the Examiner tool in Study Tools).','Start the test — questions render as an <b>interactive quiz</b>.','<b>Click an option</b>: correct turns green, wrong turns red, with a reason.','A running <b>score</b> tracks how many you got right.'],
   tip:'<b>Active recall + instant feedback</b> is the fastest way to fix weak spots.'},
  {num:'9',title:'Clinical Cases',sub:'Practice reasoning with patient scenarios built from your notes.',img:'shots/10-clinical-cases.png',
   steps:['Open <b>Clinical Cases</b>.','Pick a format: <b>Clinical case, OSCE, checklist,</b> or <b>rescue plan</b>.','Press the card button to generate it from your source.','Work through the scenario step by step.'],
   tip:'<b>OSCE station</b> gives a patient script plus a marking rubric to rehearse.'},
  {num:'10',title:'Radiology — Case Library',sub:'Browse X-rays, filter and bookmark, or upload your own.',img:'shots/11-radiology-library.png',
   steps:['Open <b>Radiology</b> to browse teaching X-rays.','<b>Filter</b> by type, difficulty, or pathology; <b>star</b> to bookmark.','<b>Upload your own X-ray</b> (delete it any time).','Click a case to open it in the <b>Viewer</b>.'],
   tip:'Cases include panoramic, periapical, and bitewing films.'},
  {num:'11',title:'Radiology — reading a film',sub:'Zoom, adjust, measure, and study labelled structures.',img:'shots/12-radiology-viewer.png',
   steps:['<b>Zoom / pan</b>, adjust <b>brightness & contrast</b>, and <b>invert</b>.','<b>Measure</b> length, angle, area. <b>Calibrate</b> a known length for real mm.','Tap a coloured <b>marker</b> to learn a structure; raise <b>difficulty</b> for subtle findings.','Markers are colour-coded: radiopaque, radiolucent, finding.'],
   tip:'Labels and measurements are teaching aids and can be approximate — <b>not for diagnosis</b>.'},
  {num:'12',title:'X-ray Interpreter',sub:'Write your reading of a film and get AI feedback.',img:'shots/13-interpreter.png',
   steps:['Open <b>X-ray Interpreter</b> and choose a case.','Write your <b>interpretation</b> in the text box.','Press <b>Get feedback</b> — right, missed, landmarks, significance, and a score.','Your attempts and scores are tracked.'],
   tip:'The AI reader can misread radiographs — treat its feedback as <b>practice, not truth</b>.'}
];
const deck = document.getElementById('deck');
// hero
deck.insertAdjacentHTML('beforeend', `<section class="slide hero"><span class="accent"></span>
  <span class="badge">DENTALOS AI · SIMAV DENTAL TUTOR</span>
  <h1>Your complete guide<br>to studying smarter</h1>
  <p>DentalOS AI turns your own lectures and notes into summaries, flashcards, quizzes, clinical cases, and X-ray practice — all grounded in your material. This deck walks through every feature, step by step.</p>
  <div class="toc">${['1 · Sign in','2 · Add notes','3 · Dashboard','4 · AI Tutor','5 · Study Tools','6 · Reading answers','7 · Flashcards','8 · Quizzes','9 · Clinical Cases','10 · Radiology','11 · X-ray Interpreter','12 · Reading films'].map(t=>`<span>${t}</span>`).join('')}</div>
  <p class="fine">A study aid for dental students. AI answers can be wrong — always verify against your source and instructors. Not for clinical use.</p></section>`);
// feature slides
for(const s of slides){
  deck.insertAdjacentHTML('beforeend', `<section class="slide"><span class="accent"></span>
    <div class="head"><span class="num">${s.num}</span><h2>${s.title}</h2></div>
    <p class="sub">${s.sub}</p>
    <div class="divider"></div>
    <div class="body">
      <div class="shot"><img src="${s.img}" alt=""></div>
      <div class="steps"><h3>How to use</h3><ol>${s.steps.map(x=>`<li>${x}</li>`).join('')}</ol><div class="tipbox"><b>Tip&nbsp;</b> ${s.tip}</div></div>
    </div></section>`);
}
// closing
deck.insertAdjacentHTML('beforeend', `<section class="slide closing"><span class="accent"></span>
  <h2>That's the whole app.</h2>
  <p>The fastest routine: <b style="color:#cfe9e4">add a source → ask the tutor → make flashcards → quiz yourself → review weak spots</b>. Add radiology practice whenever you want to read films.</p>
  <div class="pills">${['Add your notes','Ask & summarise','Flashcards','Quizzes','Clinical cases','Radiology'].map(t=>`<span class="pill">${t}</span>`).join('')}</div>
  <p class="fine">DentalOS AI · Simav Dental Tutor — an educational study aid. Always verify against your course material and instructors.</p></section>`);
</script>
</body>
</html>
