services:
  - type: web
    name: simav-dental-tutor
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    disk:
      name: dental-study-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: MAX_UPLOAD_MB
        value: 30
      - key: DAILY_AI_BUDGET
        value: 120
      - key: ALLOWED_ORIGINS
        value: https://simav-dental-tutor.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
