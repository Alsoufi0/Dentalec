services:
  - type: web
    name: simav-dental-tutor
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: dental-study-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: OPENAI_API_KEY
        sync: false
